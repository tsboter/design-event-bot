name: Update Calendar

on:
  schedule:
    # Dieser Zeitplan läuft jeden Tag um 04:00 Uhr morgens (UTC)
    - cron: '0 4 * * *'
  workflow_dispatch: # Erlaubt es dir, den Bot trotzdem manuell zu starten

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # WICHTIG: Erlaubt das Speichern der Dateien
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' # Upgrade auf 3.12
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U requests beautifulsoup4 google-genai
          
      - name: Run Script
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_cal.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "EventBot"
          git config --global user.email "bot@eventbot.com"
          # Nur adden, wenn die Datei existiert
          if [ -f data.json ]; then
            git add data.json events.ics
            # Nur committen, wenn es tatsächliche Änderungen gibt
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update calendar data" && git push)
          else
            echo "Keine Daten zum Committen gefunden."
          fi
