name: Event Scraper Daily Update

on:
  schedule:
    # Täglich um 04:00 UTC (ca. 05:00/06:00 Uhr deutsche Zeit)
    - cron: '0 4 * * *'
  workflow_dispatch: # Erlaubt dir, den Bot jederzeit manuell zu starten

permissions:
  contents: write # Ganz wichtig: Erlaubt dem Bot das Schreiben von Dateien

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4 # Wir nutzen das offizielle Python-Setup
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests beautifulsoup4

      - name: Run Scraper
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_cal.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "EventBot"
          git config --global user.email "bot@eventbot.com"
          
          # Wir fügen die Dateien hinzu, falls sie existieren
          git add data.json events.ics || echo "Keine Dateien zum Hinzufügen"
          
          # Wir prüfen, ob es wirklich Änderungen gibt, um leere Commits zu vermeiden
          if git diff --quiet && git diff --staged --quiet; then
            echo "Keine neuen Termine gefunden. Beende ohne Push."
          else
            git commit -m "📅 Neue Events automatisch hinzugefügt: $(date +'%Y-%m-%d')"
            git push
            echo "Änderungen erfolgreich gepusht!"
          fi
