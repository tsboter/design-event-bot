name: Update Calendar Feed

on:
  schedule:
    - cron: '0 8 * * 1' # Jeden Montag um 08:00
  workflow_dispatch: # Erlaubt manuelles Starten

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # WICHTIG: Erlaubt das Speichern der Dateien
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-generativeai

      - name: Run Script
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_cal.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "EventBot"
          git config --global user.email "bot@github.com"
          git add data.json events.ics
          git commit -m "Update calendar feed" || exit 0
          git push
